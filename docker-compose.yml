services:
  server:
    container_name: csdr-cloud-spatial-app-server
    build:
      context: .
      dockerfile: ./docker/server.Dockerfile
    environment:
      - DEFAULT_ORG_ID=${DEFAULT_ORG_ID}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_SPACES_ENDPOINT=${S3_SPACES_ENDPOINT}
      - S3_SPACES_SECRET_KEY=${S3_SPACES_SECRET_KEY}
      - S3_SPACES_ACCESS_KEY_ID=${S3_SPACES_ACCESS_KEY_ID}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - EMAIL_SENDER=${EMAIL_SENDER}
      - EMAIL_CATCHER=${EMAIL_CATCHER}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - NODE_ENV=production
  web:
    container_name: csdr-cloud-spatial-app-web
    build:
      context: .
      dockerfile: ./docker/web.Dockerfile
    environment:
      - NODE_ENV=production
  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx-with-compose.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
      - web
