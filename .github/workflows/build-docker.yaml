name: Publish Docker Image

env:
  AWS_ROLE_TO_ASSUME: arn:aws:iam::891612567384:role/ecr-csdr-cloud-spatial-app-role-federated

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Resolve build metadata
        id: build-metadata
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::12}"
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tags must use SemVer, for example v1.2.3." >&2
              exit 1
            fi

            app_version="${GITHUB_REF_NAME#v}"
            primary_tag="${GITHUB_REF_NAME}"
            extra_tag="sha-${short_sha}"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            app_version="0.0.0-main.${GITHUB_RUN_NUMBER}"
            primary_tag="main-${GITHUB_RUN_NUMBER}"
            extra_tag="sha-${short_sha}"
          else
            app_version="0.0.0-manual.${GITHUB_RUN_NUMBER}"
            primary_tag="manual-${GITHUB_RUN_NUMBER}"
            extra_tag="sha-${short_sha}"
          fi

          {
            echo "app_version=${app_version}"
            echo "build_time=${build_time}"
            echo "primary_tag=${primary_tag}"
            echo "extra_tag=${extra_tag}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          aws-region: ap-southeast-2
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Resolve image names
        id: image
        run: |
          set -euo pipefail

          registry="${{ steps.login-ecr.outputs.registry }}"
          repository="${{ vars.AWS_ECR_REPO }}"

          if [[ -z "${repository}" ]]; then
            echo "Repository variable AWS_ECR_REPO is required." >&2
            exit 1
          fi

          image_name="${registry}/${repository}"

          {
            echo "repository=${repository}"
            echo "image_name=${image_name}"
            echo "primary_image=${image_name}:${{ steps.build-metadata.outputs.primary_tag }}"
            echo "extra_image=${image_name}:${{ steps.build-metadata.outputs.extra_tag }}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.build-metadata.outputs.primary_tag }}
            type=raw,value=${{ steps.build-metadata.outputs.extra_tag }}
          labels: |
            org.opencontainers.image.version=${{ steps.build-metadata.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.build-metadata.outputs.build_time }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6.15.0
        with:
          context: .
          file: docker/single-file.Dockerfile
          push: true
          provenance: true
          sbom: true
          labels: ${{ steps.docker-meta.outputs.labels }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.build-metadata.outputs.app_version }}
            APP_COMMIT=${{ github.sha }}
            APP_BUILD_TIME=${{ steps.build-metadata.outputs.build_time }}
            APP_IMAGE=${{ steps.image.outputs.primary_image }}
          cache-from: |
            type=gha
            type=registry,ref=${{ steps.image.outputs.image_name }}:build-cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ steps.image.outputs.image_name }}:build-cache,mode=max

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.image.outputs.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Start ECR vulnerability scan
        run: |
          set -euo pipefail

          aws ecr start-image-scan \
            --repository-name "${{ steps.image.outputs.repository }}" \
            --image-id imageDigest="${{ steps.build.outputs.digest }}"

          aws ecr wait image-scan-complete \
            --repository-name "${{ steps.image.outputs.repository }}" \
            --image-id imageDigest="${{ steps.build.outputs.digest }}"

          findings="$(aws ecr describe-image-scan-findings \
            --repository-name "${{ steps.image.outputs.repository }}" \
            --image-id imageDigest="${{ steps.build.outputs.digest }}")"

          critical="$(jq '.imageScanFindings.findingSeverityCounts.CRITICAL // 0' <<< "$findings")"
          high="$(jq '.imageScanFindings.findingSeverityCounts.HIGH // 0' <<< "$findings")"

          echo "ECR image scan findings: CRITICAL=${critical}, HIGH=${high}"

          if (( critical > 0 || high > 0 )); then
            exit 1
          fi
