name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  APP_URL: http://localhost:3000
  AUTH_BASE_URL: http://localhost:4000
  AUTH_EMAIL_MODE: log
  BETTER_AUTH_SECRET: 0XEjaeOVzWF2OLmVYYDM4S70bODI4/x96d2KhwBKtRY=
  INTERNAL_FRONTEND_URL: http://localhost:3000
  INTERNAL_BACKEND_URL: http://localhost:4000
  TRUSTED_ORIGINS: http://localhost:3000,http://localhost:4000
  DATABASE_SSL_MODE: disable

jobs:
  validate-build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repository hygiene
        run: pnpm verify:repo-hygiene

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Dependency audit
        run: pnpm audit:deps

      - name: Lint, typecheck, and tests
        run: pnpm turbo lint typecheck test:unit

      - name: Production build
        run: pnpm build
