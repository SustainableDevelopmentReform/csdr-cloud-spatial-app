services:
  db:
    platform: linux/x86_64
    image: postgis/postgis:17-master
    restart: always
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: admin
      POSTGRES_DB: csdr-dev
    ports:
      - 5431:5432

  mailpit:
    image: axllent/mailpit:latest
    restart: always
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
